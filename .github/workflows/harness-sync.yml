# .github/workflows/harness-sync.yml
# harness-kit の更新を localmd-reader へ取り込む下流同期（kit→消費側）。
# harness-kit の sync-propose.yml テンプレート（v0.3.1）を設置したもの。
#
# 動作: 週次（+ 手動 dispatch）で sync-manifest.yaml の harness_kit_version（pin）と
# harness-kit の最新リリースを比較し、差があれば sync-manifest.yaml の consumed_scripts
# （= この PJ が opt-in したスクリプト）だけを最新版へ更新する PR を起票する。
#
# 安全保証:
#   - 同期対象は consumed_scripts のみ。未採用スクリプト（自前の emulator-smoke 等）は触らない。
#   - harness.config.sh（固有設定）は同期対象外。
#   - PR は localmd の CI（fitness/test/gradle-build/mutation）でゲートしてからマージ。
#   - 消費スクリプトは git-ROOT 解決なので無改変コピーで動く（差分ゼロ同期）。

name: harness-sync

on:
  # 週次自動実行（月曜 9:00 JST = 月曜 0:00 UTC）
  schedule:
    - cron: '0 0 * * 1'

  # 手動 dispatch（新 tag 発行時にトリガー）
  workflow_dispatch:
    inputs:
      kit_version:
        description: '同期対象 harness-kit バージョン（例: 1.0.0）'
        required: false
        type: string

env:
  HARNESS_KIT_REPO: Yos-K/harness-kit

jobs:
  sync-check-and-propose:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 消費側プロジェクトをチェックアウト
        uses: actions/checkout@v4

      - name: sync-manifest.yaml の読み込み
        id: manifest
        run: |
          if [ ! -f "sync-manifest.yaml" ]; then
            echo "❌ sync-manifest.yaml が存在しません。"
            echo "   install.sh 実行後に作成される sync-manifest.yaml が必要です。"
            exit 1
          fi
          PINNED=$(grep '^harness_kit_version:' sync-manifest.yaml \
            | sed 's/harness_kit_version: *//; s/"//g' | tr -d '[:space:]')
          echo "pinned_version=$PINNED" >> "$GITHUB_OUTPUT"
          echo "固定バージョン: $PINNED"

      - name: harness-kit の最新タグを取得
        id: kit
        run: |
          LATEST=$(gh release list \
            --repo "$HARNESS_KIT_REPO" \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            echo "警告: harness-kit のリリース情報を取得できませんでした"
            LATEST="unreleased"
          fi
          echo "latest_tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "最新バージョン: $LATEST"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: バージョン比較
        id: version_check
        run: |
          PINNED="${{ steps.manifest.outputs.pinned_version }}"
          LATEST="${{ steps.kit.outputs.latest_tag }}"
          if [ "$PINNED" = "$LATEST" ]; then
            echo "✓ 最新版を使用中です。同期 PR は不要です。"
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "バージョン差分を検出: $PINNED → $LATEST"
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 差分なしの場合はスキップ
        if: steps.version_check.outputs.up_to_date == 'true'
        run: echo "同期不要。ワークフロー終了。"

      - name: harness-kit を一時クローン（同期先の release tag を明示 checkout）
        if: steps.version_check.outputs.up_to_date == 'false'
        run: |
          # default ブランチ(HEAD)ではなく、同期先の最新 tag を clone する。HEAD を引くと
          # tag 以降のコミットが混ざり、pin 記録（tag）と実際にコピーするファイルがズレる。
          git clone --depth 1 \
            --branch "${{ steps.kit.outputs.latest_tag }}" \
            "https://github.com/$HARNESS_KIT_REPO.git" \
            /tmp/harness-kit

      - name: 差分を取得（消費側が opt-in した consumed_scripts のみ）
        if: steps.version_check.outputs.up_to_date == 'false'
        id: diff
        run: |
          KIT_MANIFEST="/tmp/harness-kit/sync-manifests/android-jvm.yaml"
          KIT_DIR="/tmp/harness-kit"
          SYNC_FILES=""

          # 同期するのは「この消費側が consumed_scripts で取り込むと宣言したファイル」だけ。
          # kit の全ホワイトリストを撒くと、消費側が未採用・未設定のスクリプト（固有値や
          # ROOT 解決が前提のもの）まで上書きして壊す。opt-in に絞ることで、部分消費の
          # プロジェクトでも安全かつ増分的に更新できる。kit の whitelist は「kit 管理の
          # 正当なファイルか」の検証にのみ使う（whitelist 外は構造上同期不可）。
          consumed=$(grep -A10000 '^consumed_scripts:' sync-manifest.yaml \
            | grep -E '^[[:space:]]*-[[:space:]]' \
            | sed -E 's/^[[:space:]]*-[[:space:]]*//; s/[[:space:]]*#.*$//; s/[[:space:]]*$//')

          for consumer_file in $consumed; do
            [ -n "$consumer_file" ] || continue
            base="$(basename "$consumer_file")"
            # kit 側の正当なソースパスを basename で引く（whitelist 外なら同期しない）
            rel_path=$(grep -E "/${base}\$" "$KIT_MANIFEST" \
              | grep -E '^[[:space:]]*-' | sed -E 's/^[[:space:]]*-[[:space:]]*//' | head -1)
            if [ -z "$rel_path" ]; then
              echo "WARN: $base は kit whitelist に無い → 同期対象外"
              continue
            fi
            kit_file="$KIT_DIR/$rel_path"
            [ -f "$kit_file" ] || continue
            if [ ! -f "$consumer_file" ] || \
               ! diff -q "$kit_file" "$consumer_file" > /dev/null 2>&1; then
              mkdir -p "$(dirname "$consumer_file")"
              cp "$kit_file" "$consumer_file"
              SYNC_FILES="$SYNC_FILES $consumer_file"
            fi
          done

          echo "synced_files=$SYNC_FILES" >> "$GITHUB_OUTPUT"
          echo "変更対象ファイル数: $(echo "$SYNC_FILES" | wc -w)"

      - name: sync-manifest.yaml のバージョン更新
        if: steps.version_check.outputs.up_to_date == 'false'
        run: |
          LATEST="${{ steps.kit.outputs.latest_tag }}"
          sed -i "s/^harness_kit_version:.*/harness_kit_version: \"$LATEST\"/" sync-manifest.yaml

      - name: 同期 PR を起票
        if: steps.version_check.outputs.up_to_date == 'false'
        run: |
          LATEST="${{ steps.kit.outputs.latest_tag }}"
          BRANCH="harness-sync/$LATEST"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # 変更ファイルをステージング
          # harness.config.sh は consumed_scripts ではないため構造上 synced_files に
          # 入らないが、万一のフォールスポジティブに備えて念のため除外する。
          for f in ${{ steps.diff.outputs.synced_files }}; do
            case "$f" in
              *harness.config.sh)
                echo "除外（固有設定）: $f"
                ;;
              *)
                git add "$f"
                ;;
            esac
          done
          git add sync-manifest.yaml  # バージョン更新のみ

          git diff --cached --quiet && echo "差分なし。コミット不要。" && exit 0

          git commit -m "chore: sync harness-kit scripts to $LATEST"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: sync harness-kit to $LATEST" \
            --body "## harness-kit 同期 PR

          ### 概要
          harness-kit \`$LATEST\` が利用可能になりました。
          \`sync-manifest.yaml\` の \`consumed_scripts\`（この PJ が opt-in したスクリプト）に従い、
          消費対象スクリプトのみを最新版へ更新します。

          ### 固有設定の保護
          以下のファイルは opt-in 方式により、この PR に**含まれません**:
          - \`harness.config.sh\` — プロジェクト固有の設定値（FITNESS_MAX_LINES / MUTATION_THRESHOLD 等）
          - \`consumed_scripts\` に列挙されていないスクリプト（自前の emulator-smoke 等）

          ### マージ前チェックリスト
          - [ ] CI の全ゲート（fitness / test / gradle-build / mutation）が green であること
          - [ ] \`harness.config.sh\` の固有設定値が変更されていないこと
          - [ ] 差分スクリプトの変更内容をレビュー済みであること
          " \
            --head "$BRANCH" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
